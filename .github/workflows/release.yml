name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: YouTubeTranscribeExtractor-Windows.exe
            arch: win64_msvc2019_64
          - os: macos-14
            artifact_name: YouTubeTranscribeExtractor-macOS.dmg
            arch: clang_64
          - os: ubuntu-latest
            artifact_name: YouTubeTranscribeExtractor-Linux.tar.gz
            arch: linux_gcc_64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          pip install youtube-transcript-api pyinstaller

      - name: Compile Python helper
        run: |
          pyinstaller --onefile get_transcript.py

      - name: Install Linux Build Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgl1-mesa-dev libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xfixes0 libxcb-xinerama0

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.2'
          arch: ${{ matrix.arch }}

      - name: Patch Qt AGL dependency on macOS
        if: matrix.os == 'macos-14'
        run: |
          python3 -c "
          import os, re
          cmake_dir = os.path.abspath(os.path.join(os.environ['GITHUB_WORKSPACE'], '../Qt/6.7.2/macos/lib/cmake'))
          print('Scanning:', cmake_dir)
          for root, dirs, files in os.walk(cmake_dir):
              for file in files:
                  if file.endswith('.cmake'):
                      fp = os.path.join(root, file)
                      with open(fp, 'r', encoding='utf-8', errors='ignore') as f:
                          c = f.read()
                      if 'AGL' in c:
                          print('Found in:', fp)
                          for l in c.splitlines():
                              if 'AGL' in l:
                                  print('  Before:', l)
                          c = c.replace('-framework AGL', '')
                          c = c.replace('/System/Library/Frameworks/AGL.framework', '')
                          c = re.sub(r'\bAGL\b', '', c)
                          c = re.sub(r';+', ';', c)
                          with open(fp, 'w', encoding='utf-8') as f:
                              f.write(c)
          "

      - name: Configure CMake
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build C++ Application
        run: |
          cmake --build build --config Release

      # Packaging - Windows
      - name: Package Windows Release
        if: matrix.os == 'windows-latest'
        run: |
          # Download Enigma Virtual Box setup (using curl to avoid PowerShell progress bar render hangs)
          curl -L -o enigmavb_setup.exe https://enigmaprotector.com/assets/files/enigmavb.exe
          
          # Install Enigma Virtual Box silently using Inno Setup switches
          Start-Process -FilePath ".\enigmavb_setup.exe" -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART" -Wait -NoNewWindow
          
          # Prepare publish directory and run windeployqt
          mkdir publish
          copy build\Release\YouTubeTranscribeExtractor.exe publish\
          windeployqt --release --no-translations --compiler-runtime publish\YouTubeTranscribeExtractor.exe
          
          # Delete the executable from publish directory so it doesn't get packed as a virtual file inside itself
          Remove-Item publish\YouTubeTranscribeExtractor.exe
          
          # Install generate-evb utility
          npm install generate-evb
          
          # Generate the .evb project file
          node -e "const gen = require('generate-evb'); gen('project.evb', 'build/Release/YouTubeTranscribeExtractor.exe', 'YouTubeTranscribeExtractor-Windows.exe', 'publish');"
          
          # Pack it into a single executable
          & "C:\Program Files (x86)\Enigma Virtual Box\enigmavbconsole.exe" project.evb
        shell: pwsh

      # Packaging - macOS
      - name: Package macOS Release
        if: matrix.os == 'macos-14'
        run: |
          macdeployqt build/YouTubeTranscribeExtractor.app -dmg
          mv build/YouTubeTranscribeExtractor.dmg YouTubeTranscribeExtractor-macOS.dmg

      # Packaging - Linux
      - name: Package Linux Release
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir publish
          cp build/YouTubeTranscribeExtractor publish/
          tar -czvf YouTubeTranscribeExtractor-Linux.tar.gz -C publish .

      # Upload to GitHub Release
      - name: Create GitHub Release and Upload Binaries
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
