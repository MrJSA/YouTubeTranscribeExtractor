name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: YouTubeTranscribeExtractor-Windows.zip
            arch: win64_msvc2022_64
          - os: macos-latest
            artifact_name: YouTubeTranscribeExtractor-macOS.dmg
            arch: clang_64
          - os: ubuntu-latest
            artifact_name: YouTubeTranscribeExtractor-Linux.tar.gz
            arch: gcc_64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          pip install youtube-transcript-api pyinstaller

      - name: Compile Python helper
        run: |
          pyinstaller --onefile get_transcript.py

      - name: Install Linux Build Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgl1-mesa-dev libxkbcommon-x11-0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xfixes0 libxcb-xinerama0

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.11.1'
          arch: ${{ matrix.arch }}

      - name: Configure CMake
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build C++ Application
        run: |
          cmake --build build --config Release

      # Packaging - Windows
      - name: Package Windows Release
        if: matrix.os == 'windows-latest'
        run: |
          mkdir publish
          copy build\Release\YouTubeTranscribeExtractor.exe publish\
          windeployqt --release --no-translations --compiler-runtime publish\YouTubeTranscribeExtractor.exe
          Compress-Archive -Path publish\* -DestinationPath YouTubeTranscribeExtractor-Windows.zip
        shell: pwsh

      # Packaging - macOS
      - name: Package macOS Release
        if: matrix.os == 'macos-latest'
        run: |
          macdeployqt build/YouTubeTranscribeExtractor.app -dmg
          mv build/YouTubeTranscribeExtractor.dmg YouTubeTranscribeExtractor-macOS.dmg

      # Packaging - Linux
      - name: Package Linux Release
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir publish
          cp build/YouTubeTranscribeExtractor publish/
          tar -czvf YouTubeTranscribeExtractor-Linux.tar.gz -C publish .

      # Upload to GitHub Release
      - name: Create GitHub Release and Upload Binaries
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
