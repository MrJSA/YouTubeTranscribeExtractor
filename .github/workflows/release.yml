name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          pip install youtube-transcript-api pyinstaller

      - name: Compile Python helper
        run: |
          pyinstaller --onefile get_transcript.py

      - name: Configure CMake
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build C++ Application
        run: |
          cmake --build build --config Release

      - name: Create GitHub Release and Upload Binary
        uses: softprops/action-gh-release@v2
        with:
          files: build/Release/YouTubeTranscribeExtractor.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
